<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Play — CDL Checkers</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ===== ONLINE LOBBY — fully self-contained, no dependency on style.css ===== */
    #online-lobby {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.82);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    #lobby-card {
      background: #1a1a2e;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 18px;
      padding: 2rem 1.75rem;
      width: 100%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.6);
      color: #ffffff;
      font-family: inherit;
    }

    #lobby-card h2 {
      margin: 0 0 1.5rem;
      font-size: 1.5rem;
      font-weight: 700;
      color: #ffffff;
    }

    /* Lobby-specific buttons — do NOT use .btn from main CSS */
    .lbtn {
      display: block;
      width: 100%;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      border: none;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .lbtn:active { transform: scale(0.97); }
    .lbtn:hover  { opacity: 0.88; }

    .lbtn-primary {
      background: linear-gradient(135deg, #6c63ff, #3ecfcf);
      color: #ffffff;
    }

    .lbtn-secondary {
      background: rgba(255, 255, 255, 0.12);
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .lbtn-sm {
      display: inline-block;
      width: auto;
      padding: 0.4rem 0.85rem;
      font-size: 0.85rem;
      border-radius: 7px;
    }

    .lobby-divider {
      color: rgba(255, 255, 255, 0.35);
      font-size: 0.85rem;
      margin: 0.6rem 0;
    }

    .lobby-btn-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .join-row {
      display: flex;
      gap: 0.5rem;
    }

    .join-row input {
      flex: 1;
      padding: 0.7rem 0.9rem;
      border-radius: 9px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.07);
      color: #ffffff;
      font-size: 1.05rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      outline: none;
      font-family: monospace;
    }
    .join-row input::placeholder { color: rgba(255,255,255,0.3); letter-spacing: 0; font-family: inherit; }
    .join-row input:focus { border-color: rgba(255, 255, 255, 0.5); }

    #lobby-back {
      display: inline-block;
      margin-top: 0.75rem;
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.38);
      text-decoration: none;
      cursor: pointer;
    }
    #lobby-back:hover { color: rgba(255, 255, 255, 0.65); }

    /* Waiting state */
    #lobby-waiting { display: none; }

    #lobby-msg {
      color: rgba(255, 255, 255, 0.65);
      font-size: 0.95rem;
      margin: 0 0 1rem;
    }

    #room-code-display {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 0.85rem 1rem;
      margin-bottom: 1rem;
    }

    #lobby-code {
      font-size: 2.1rem;
      font-weight: 800;
      letter-spacing: 0.28em;
      color: #ffffff;
      font-family: monospace;
    }

    #lobby-status {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.9rem;
      margin-top: 0.5rem;
      min-height: 1.2em;
    }

    #lobby-error {
      display: none;
      color: #ff7070;
      font-size: 0.875rem;
      margin-top: 0.85rem;
      padding: 0.55rem 0.75rem;
      background: rgba(255, 80, 80, 0.1);
      border-radius: 8px;
    }
  </style>
</head>

<body>

  <!-- ===== NAV ===== -->
  <nav class="nav" id="nav">
    <a href="index.html" class="nav-logo" aria-label="CDL Checkers home">
      <span class="cdl">CDL</span><span class="rest">Checkers</span>
    </a>
    <ul class="nav-links" role="list">
      <li><a href="index.html">Home</a></li>
      <li><a href="game.html" class="active">Play</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
  </nav>

  <!-- ===== ONLINE LOBBY OVERLAY ===== -->
  <div id="online-lobby" role="dialog" aria-modal="true" aria-label="Online lobby">
    <div id="lobby-card">
      <h2>🌐 Play Online</h2>

      <!-- Step 1: Choose create or join -->
      <div id="lobby-choice">
        <div class="lobby-btn-group">
          <button class="lbtn lbtn-primary" onclick="createOnlineRoom()">🏠 Create a Room</button>
          <div class="lobby-divider">— or enter a room code —</div>
          <div class="join-row">
            <input
              type="text"
              id="room-code-input"
              placeholder="e.g. K7MN4P"
              maxlength="6"
              autocomplete="off"
              onkeydown="if(event.key==='Enter') joinOnlineRoomFromInput()"
            />
            <button class="lbtn lbtn-secondary lbtn-sm" onclick="joinOnlineRoomFromInput()">Join</button>
          </div>
        </div>
        <a id="lobby-back" href="index.html">← Back to home</a>
      </div>

      <!-- Step 2: Waiting / connecting state -->
      <div id="lobby-waiting">
        <p id="lobby-msg"></p>
        <div id="room-code-display">
          <span id="lobby-code"></span>
          <button id="copy-btn" class="lbtn lbtn-secondary lbtn-sm" onclick="copyRoomCode()">⧉ Copy</button>
        </div>
        <p id="lobby-status"></p>
      </div>

      <div id="lobby-error"></div>
    </div>
  </div>

  <!-- ===== PAGE ===== -->
  <main class="page game-page">
    <div class="game-container">

      <!-- Status bar -->
      <div class="status-bar" id="status-bar" aria-live="polite">
        <div class="status-turn">
          <span class="turn-dot p1" id="turn-dot"></span>
          <span id="turn-text">Your turn</span>
        </div>
        <div class="status-counts">
          <div class="count-badge">
            <span class="count-pip p1"></span>
            <span id="p1-count">12</span>
          </div>
          <div class="count-badge">
            <span class="count-pip p2"></span>
            <span id="p2-count">12</span>
          </div>
        </div>
      </div>

      <!-- Board -->
      <div class="board-wrap">
        <div id="board" role="grid" aria-label="Checkers board"></div>
      </div>

      <!-- Actions -->
      <div class="game-actions">
        <p class="mode-label">Mode: <span id="mode-label">—</span></p>
        <button class="btn btn-secondary" id="new-game-btn">&#x21BA; New Game</button>
      </div>

    </div>
  </main>

  <!-- Win overlay -->
  <div class="win-overlay" id="win-overlay" aria-modal="true" role="dialog" aria-labelledby="win-title">
    <div class="win-card">
      <div class="win-title" id="win-title"></div>
      <p class="win-sub" id="win-sub"></p>
      <button class="btn btn-primary" id="play-again-btn">&#x21BA; Play Again</button>
    </div>
  </div>

  <!-- Supabase JS (required for online multiplayer) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="game.js"></script>
</body>

</html>
